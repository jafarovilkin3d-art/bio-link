<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dotted Game - Yönləndirilir...</title>
    <script type="text/javascript">
        window.onload = function() {
            // 1. Mağaza Linklərin
            var playStoreUrl = "https://play.google.com/store/apps/details?id=com.jafaroffdavid.riyaziyyatoyunu";
            var appStoreUrl = "https://apps.apple.com/app/dotted-game/id6760192224";
            var webFallback = "https://jafarovilkin3d-art.github.io/"; // Kompüterlə girənlər üçün

            // 2. Cihazın təyin edilməsi
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;

            // iOS yoxlaması (iPhone, iPad, iPod)
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                window.location.href = appStoreUrl;
            } 
            // Android yoxlaması
            else if (/android/i.test(userAgent)) {
                window.location.href = playStoreUrl;
            } 
            // Əgər kompüterdən (Desktop) girirlərsə
            else {
                window.location.href = webFallback;
            }
        };
    </script>
</head>
<body style="background: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: -apple-system, sans-serif;">
    <div style="text-align: center;">
        <p style="font-size: 18px; color: #333;">Dotted Game-ə yönləndirilirsiniz...</p>
        <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto;"></div>
    </div>

    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</body>
</html>
